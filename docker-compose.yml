version: '3.8'

networks:
  fraud-net:
    driver: bridge

services:
  redpanda:
    image: docker.vectorized.io/vectorized/redpanda:v23.3.6
    command:
      - redpanda
      - start
      - --smp
      - '1'
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - '0'
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:9093
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092,OUTSIDE://localhost:9093
    ports:
      - '9092:9092'
      - '9093:9093'
    networks:
      - fraud-net
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/secretpassword
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - '7474:7474'
      - '7687:7687'
    networks:
      - fraud-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  ts-service:
    build: ./typescript-service
    environment:
      - KAFKA_BROKER=redpanda:9092
      - LOG_LEVEL=info
      - PORT=3000
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - '3000:3000'
    networks:
      - fraud-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  py-agents:
    build: ./python-agents
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASS=secretpassword
      - KAFKA_BROKER=redpanda:9092
      - KAFKA_TOPIC=high-value-transactions
      - KAFKA_GROUP_ID=fraud-agents-group
      - LOG_LEVEL=INFO
      - HIGH_VALUE_THRESHOLD=10000
      - HIGH_CONNECTIONS_THRESHOLD=10
    depends_on:
      redpanda:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    ports:
      - '8000:8000'
    networks:
      - fraud-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8000/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped