version: '3.8'
services:
  redpanda:
    image: docker.vectorized.io/vectorized/redpanda:latest
    command:
      - redpanda
      - start
      - --smp
      - '1'
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - '0'
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:9093
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092,OUTSIDE://localhost:9093
    ports:
      - '9092:9092'
      - '9093:9093'
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/secretpassword
    ports:
      - '7474:7474'
      - '7687:7687'
  ts-service:
    build: ./typescript-service
    environment:
      - KAFKA_BROKER=redpanda:9092
    depends_on:
      - redpanda
    ports:
      - '3000:3000'
  py-agents:
    build: ./python-agents
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASS=secretpassword
      - KAFKA_BROKER=redpanda:9092
    depends_on:
      - redpanda
      - neo4j
    ports:
      - '8000:8000'